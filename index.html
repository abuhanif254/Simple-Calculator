<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculatorBody">
        <input type="text" id="display" class="calculator-display" readonly />
        <div class="calculator-grid">
            <button class="btn function" onclick="clearDisplay()">C</button>
            <button class="btn function" onclick="appendValue('(')">(</button>
            <button class="btn function" onclick="appendValue(')')">)</button>
            <button class="btn function" onclick="appendValue('%')">%</button>
            <button class="btn" onclick="appendValue('7')">7</button>
            <button class="btn" onclick="appendValue('8')">8</button>
            <button class="btn" onclick="appendValue('9')">9</button>
            <button class="btn operator" onclick="appendValue('+')">+</button>
            <button class="btn" onclick="appendValue('4')">4</button>
            <button class="btn" onclick="appendValue('5')">5</button>
            <button class="btn" onclick="appendValue('6')">6</button>
            <button class="btn operator" onclick="appendValue('-')">-</button>
            <button class="btn" onclick="appendValue('1')">1</button>
            <button class="btn" onclick="appendValue('2')">2</button>
            <button class="btn" onclick="appendValue('3')">3</button>
            <button class="btn operator" onclick="appendValue('*')">×</button>
            <button class="btn" onclick="appendValue('0')">0</button>
            <button class="btn" onclick="appendValue('.')">.</button>
            <button class="btn operator" onclick="appendValue('/')">÷</button>
            <button class="btn equals" onclick="calculateResult()">=</button>
            <button class="btn function" onclick="deleteLastChar()">⌫</button>
        </div>
    </div>
    
<script>
    function clearDisplay() {
        document.getElementById('display').value = '';
    }

    function appendValue(val) {
        const display = document.getElementById('display');
        if (val === '%') {
            // Calculate percentage of current value
            try {
                display.value = (parseFloat(display.value) / 100) || '';
            } catch {
                display.value = '';
            }
        } else {
            display.value += val;
        }
    }

    function deleteLastChar() {
        const display = document.getElementById('display');
        display.value = display.value.slice(0, -1);
    }

    function calculateResult() {
        const display = document.getElementById('display');
        let expression = display.value.replace(/×/g, '*').replace(/÷/g, '/');
        try {
            // Only allow safe characters
            if (/^[0-9+\-*/().% ]+$/.test(expression)) {
                display.value = Function('return ' + expression)();
            } else {
                display.value = 'Error';
            }
        } catch {
            display.value = 'Error';
        }
    }
</script>

</html>
